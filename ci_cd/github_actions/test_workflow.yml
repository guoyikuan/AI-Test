name: AI-Driven Test Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每天凌晨2点运行
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install ${{ matrix.browser }}
        playwright install-deps
    
    - name: Run tests with Playwright
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        POWER_BI_CLIENT_ID: ${{ secrets.POWER_BI_CLIENT_ID }}
        POWER_BI_CLIENT_SECRET: ${{ secrets.POWER_BI_CLIENT_SECRET }}
        POWER_BI_TENANT_ID: ${{ secrets.POWER_BI_TENANT_ID }}
      run: |
        pytest tests/ \
          --browser=${{ matrix.browser }} \
          --html=reports/report.html \
          --self-contained-html \
          -n auto
    
    - name: Generate LLM test cases
      if: github.event_name == 'push'
      run: |
        python llm_services/test_generation/generate_tests.py
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.browser }}-${{ matrix.python-version }}
        path: |
          reports/
          screenshots/
          videos/
    
    - name: Upload Power BI data
      if: always()
      run: |
        python dashboard/upload_to_power_bi.py
  
  analyze:
    runs-on: ubuntu-latest
    needs: test
    if: failure()
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download test artifacts
      uses: actions/download-artifact@v3
    
    - name: Analyze failures with LLM
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python llm_services/defect_analysis/batch_analyze.py
    
    - name: Create analysis report
      run: |
        python llm_services/defect_analysis/generate_report.py
    
    - name: Upload analysis report
      uses: actions/upload-artifact@v3
      with:
        name: failure-analysis
        path: reports/defect_analysis.json

