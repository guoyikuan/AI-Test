[pytest]
# Pytest配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --alluredir=allure-results
    --maxfail=5

# 标记
markers =
    ui: UI测试
    api: API测试
    smoke: 冒烟测试
    regression: 回归测试
    llm_generated: LLM生成的测试用例
    self_healing: 使用自愈机制的测试

# 日志
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Playwright配置
playwright_browser = chromium
playwright_headless = true
playwright_timeout = 30000

